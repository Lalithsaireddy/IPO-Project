<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPO Admin Dashboard</title>
    <link rel="stylesheet" href="style_admin.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Bluestock Fintech</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="#">Dashboard</a></li>
                <li><a href="#">Manage IPO</a></li>
                <li><a href="#">IPO Subscription</a></li>
                <li><a href="#">IPO Allotment</a></li>
                <li><a href="#">Settings</a></li>
            </ul>
        </aside>
        
        <!-- Main content -->
        <main class="main-content">
            <header>
                <div class="header-left">
                    <h2>Dashboard</h2>
                </div>
                <div class="header-right">
                    <span>Hi, Vishal</span>
                </div>
            </header>
            <div class="main-dashboard">
                <section class="dashboard-left">
                    <h3>IPO Dashboard India</h3>
                    <div class="card">
                        <div class="circle" style="background-color: #4caf50;">20</div>
                        <div class="card-info">
                            <p>IPO in Gain</p>
                            <p>30</p>
                        </div>
                    </div>
                    <div class="card">
                        <div class="circle" style="background-color: #f44336;">9</div>
                        <div class="card-info">
                            <p>IPO in Loss</p>
                            <p>30</p>
                        </div>
                    </div>
                </section>
                <section class="dashboard-right">
                    <h3>Main Board IPO</h3>
                    <div class="quick-links">
                        <a href="#">NSE India</a>
                        <a href="#">BSE India</a>
                        <a href="#">SEBI</a>
                        <a href="#">Money Control</a>
                    </div>
                    <div class="chart">
                        <canvas id="main-board-ipo-chart"></canvas>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
